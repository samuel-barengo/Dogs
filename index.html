  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === 'p') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).filter(function (v) { return v.slice(0, 2) === 'p=' })[0];
        if (decoded !== undefined) {
          // A mágica acontece aqui: ele reconstrói a URL corretamente para o basename "/Dogs"
          window.history.replaceState(null, null,
            l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded.slice(2) + l.hash
          );
        }
      }
    }(window.location))
